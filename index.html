<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kevaier.de | Meine Links</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 480px; text-align: center; }
        .profile-img { width: 96px; height: 96px; border-radius: 50%; background: #38bdf8; margin-bottom: 16px; border: 3px solid #38bdf8; object-fit: cover; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #ffffff; }
        p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 32px; }
        .links { display: flex; flex-direction: column; gap: 16px; width: 100%; margin-bottom: 40px; }
        .link-btn { display: block; padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #ffffff; text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.2s ease; }
        .link-btn:hover { background: #38bdf8; color: #0f172a; transform: translateY(-2px); border-color: #38bdf8; box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3); }
        footer { margin-top: auto; display: flex; gap: 16px; font-size: 0.8rem; }
        footer a { color: #64748b; text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Optional: Ersetze das div durch ein <img src="dein-bild.jpg"> falls du ein Profilbild nutzen willst -->
        <div class="profile-img"></div>
        
        <h1>@kevaier</h1>
        <p>Willkommen auf meiner offiziellen Link-Seite!</p>

        <div class="links">
            <!-- Tausche das '#' gegen deine echten Links aus -->
            <a href="#" target="_blank" class="link-btn">Mein Instagram Profile</a>
            <a href="#" target="_blank" class="link-btn">Mein TikTok Channel</a>
            <a href="#" target="_blank" class="link-btn">Mein YouTube Kanal</a>
            <a href="#" target="_blank" class="link-btn">Kontakt per E-Mail</a>
        </div>
    </div>

    <footer>
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </footer>

</body>
</html>
