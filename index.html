<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home.kevaier.de</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* Container für dein Bild oder Text */
        .content-container { text-align: center; max-width: 90%; }
        
        /* Einstellungen für das Bild */
        .main-image { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        
        /* Einstellungen, falls du stattdessen Text nutzt */
        .main-text { font-size: 1.8rem; font-weight: bold; color: #ffffff; letter-spacing: 1px; }

        /* Unauffälliger Footer ganz unten */
        footer { position: absolute; bottom: 20px; display: flex; gap: 20px; font-size: 0.8rem; }
        footer a { color: #475569; text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="content-container">
        <!-- OPTION A: Ein Bild anzeigen (Tausche 'dein-bild.jpg' gegen den Namen deines Bildes aus) -->
        <img src="dein-bild.jpg" alt="Logo oder Grafik" class="main-image">

        <!-- OPTION B: Falls du lieber Text willst, lösche die Zeile oben und nutze diese hier: -->
        <!-- <div class="main-text">Hier entsteht etwas Neues.</div> -->
    </div>

    <footer>
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </footer>

</body>
</html>
